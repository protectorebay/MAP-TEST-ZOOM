<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Earthquake World Map</title>

<meta name="viewport" content="width=1920, initial-scale=1.0">

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
html, body {
  margin: 0;
  padding: 0;
  width: 1920px;
  height: 1080px;
  overflow: hidden;
  background: black;
}

#map {
  width: 100%;
  height: 100%;
  position: relative;
}

.leaflet-container {
  background: black !important;
}

/* MASK */
#map::after {
  content: "";
  position: absolute;
  top: 0;
  width: 100%;
  height: 120px;
  background: linear-gradient(to bottom, black, transparent);
  pointer-events: none;
}
#map::before {
  content: "";
  position: absolute;
  bottom: 0;
  width: 100%;
  height: 120px;
  background: linear-gradient(to top, black, transparent);
  pointer-events: none;
}

/* LABEL */
.label {
  background: rgba(0,0,0,0.9);
  color: white;
  padding: 6px 10px;
  border-radius: 6px;
  font-weight: bold;
  font-size: 14px;
}

/* MARKER */
.marker {
  border-radius: 50%;
  position: relative;
}

.red { background: red; }
.orange { background: orange; }

/* STANDARD PULSE */
.pulse::after {
  content: "";
  position: absolute;
  width: 100%;
  height: 100%;
  border-radius: 50%;
  left: 0;
  top: 0;
  animation: pulse 2s infinite;
}

.pulse.red::after { background: red; }
.pulse.orange::after { background: orange; }

/* STRONG HIGHLIGHT (NO ZOOM) */
.highlight::after {
  content: "";
  position: absolute;
  width: 100%;
  height: 100%;
  border-radius: 50%;
  left: 0;
  top: 0;
  background: orange;
  animation: highlightPulse 1s ease-out 3;
}

@keyframes pulse {
  0%   { transform: scale(1); opacity: 1; }
  70%  { transform: scale(2.5); opacity: 0; }
  100% { transform: scale(2.5); opacity: 0; }
}

@keyframes highlightPulse {
  0%   { transform: scale(1); opacity: 1; }
  100% { transform: scale(3.5); opacity: 0; }
}
</style>
</head>

<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
const API_URL = "https://earthquake.usgs.gov/earthquakes/feed/v1.0/summary/all_hour.geojson";
const MAPTILER_KEY = "sygtoTM5lxScVNfPR99k";

/* MAP */
let map = L.map('map', {
  zoomControl: false,
  attributionControl: false,
  worldCopyJump: false
}).setView([10, 0], 2.8);

L.tileLayer(
  `https://api.maptiler.com/maps/hybrid/{z}/{x}/{y}.jpg?key=${MAPTILER_KEY}`,
  {
    tileSize: 512,
    zoomOffset: -1,
    detectRetina: true,
    noWrap: true
  }
).addTo(map);

let markersLayer = L.layerGroup().addTo(map);

const DEFAULT_CENTER = [10, 0];
const DEFAULT_ZOOM = 2.8;

let returnTimeout = null;
let lastEventId = null;

/* SIZE */
function getSize(mag, base) {
  if (!mag || mag < 2) return base;
  if (mag < 3) return base + 2;
  if (mag < 4) return base + 4;
  if (mag < 5) return base + 6;
  return base + 8;
}

/* CREATE MARKER */
function createMarker(lat, lon, type, mag, highlight=false) {
  let size = 10;

  if (type === "latest") size = getSize(mag, 18);
  else if (type === "secondary") size = getSize(mag, 12);
  else size = getSize(mag, 8);

  let el = document.createElement("div");
  el.className = "marker";

  el.style.width = size + "px";
  el.style.height = size + "px";

  if (type === "latest") {
    el.classList.add("red", "pulse");
  } else if (type === "secondary") {
    el.classList.add("orange", "pulse");
  } else {
    el.classList.add("orange");
  }

  if (highlight) {
    el.classList.add("highlight");
  }

  return L.marker([lat, lon], {
    icon: L.divIcon({
      html: el,
      className: "",
      iconSize: [size, size]
    })
  });
}

/* ZOOM */
function focusOn(lat, lon) {
  map.flyTo([lat, lon], 5, { duration: 2 });

  if (returnTimeout) clearTimeout(returnTimeout);

  returnTimeout = setTimeout(() => {
    map.flyTo(DEFAULT_CENTER, DEFAULT_ZOOM, { duration: 2 });
  }, 60000);
}

/* LOAD */
function loadData() {
  fetch(API_URL)
    .then(r => r.json())
    .then(data => {

      if (!data.features) return;

      let features = data.features.slice(0, 20);

      markersLayer.clearLayers();

      features.forEach((f, index) => {
        let coords = f.geometry.coordinates;
        let props = f.properties;

        let type = "dot";
        if (index === 0) type = "latest";
        else if (index === 1 || index === 2) type = "secondary";

        let isNew = (f.id !== lastEventId);

        let marker = createMarker(
          coords[1],
          coords[0],
          type,
          props.mag,
          isNew && props.mag < 5 // highlight only for small quakes
        );

        marker.addTo(markersLayer);

        if (index === 0) {
          if (isNew) {
            lastEventId = f.id;

            /* ZOOM ONLY FOR M5+ */
            if (props.mag >= 5) {
              focusOn(coords[1], coords[0]);
            }
          }

          let mag = props.mag ?? "?";
          let place = props.place || "Unknown";

          marker.bindTooltip(
            `<div class="label">M${mag} — ${place}</div>`,
            {
              permanent: true,
              direction: "top",
              offset: [0, -15]
            }
          ).openTooltip();
        }
      });

    })
    .catch(err => console.log(err));
}

loadData();
setInterval(loadData, 60000);
</script>

</body>
</html>
