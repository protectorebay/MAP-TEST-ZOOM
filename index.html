<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Earthquake World Map</title>

<meta name="viewport" content="width=2100, initial-scale=1.0">

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
html, body {
  margin: 0;
  padding: 0;
  width: 2100px;
  height: 1200px;
  overflow: hidden;
  background: black;
}

#map {
  width: 100%;
  height: 100%;
}

/* 🔴 UPDATED LABEL */
.label {
  background: rgba(0,0,0,0.75);
  color: white;
  padding: 8px 12px;
  border-radius: 6px;
  font-size: 14px;
  font-weight: bold;
  border: 2px solid red;
  line-height: 1.2;
}

/* BASE MARKER */
.marker {
  border-radius: 50%;
  position: relative;
}

/* COLORS */
.red { background: red; }
.orange { background: orange; }
.blue { background: #00aaff; }

/* PULSE */
.pulse::after {
  content: "";
  position: absolute;
  left: 0;
  top: 0;
  width: 100%;
  height: 100%;
  border-radius: 50%;
  animation: pulse 2s infinite;
}

.pulse.red::after { background: red; }
.pulse.orange::after { background: orange; }

@keyframes pulse {
  0%   { transform: scale(1); opacity: 1; }
  70%  { transform: scale(2.5); opacity: 0; }
  100% { transform: scale(2.5); opacity: 0; }
}
</style>
</head>

<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
const API_URL = "https://earthquake.usgs.gov/earthquakes/feed/v1.0/summary/all_hour.geojson";
const MAPTILER_KEY = "sygtoTM5lxScVNfPR99k";

/* MAP INIT */
let map = L.map('map', {
  zoomControl: false,
  attributionControl: false
}).setView([20, 0], 2);

/* MAP LAYER */
L.tileLayer(
  `https://api.maptiler.com/maps/hybrid/{z}/{x}/{y}.jpg?key=${MAPTILER_KEY}`,
  {
    tileSize: 512,
    zoomOffset: -1,
    detectRetina: true
  }
).addTo(map);

let markersLayer = L.layerGroup().addTo(map);

/* DEFAULT VIEW */
const DEFAULT_VIEW = {
  center: [20, 0],
  zoom: 2
};

let returnTimeout = null;
let lastEventId = null;

/* SIZE BY MAG */
function getSize(mag, base) {
  if (!mag || mag < 2) return base;
  if (mag < 3) return base + 2;
  if (mag < 4) return base + 4;
  if (mag < 5) return base + 6;
  return base + 8;
}

/* CREATE MARKER */
function createMarker(lat, lon, type, mag) {
  let size = 10;

  if (type === "latest") size = getSize(mag, 18);
  else if (type === "secondary") size = getSize(mag, 12);
  else size = getSize(mag, 8);

  let el = document.createElement("div");
  el.className = "marker";

  el.style.width = size + "px";
  el.style.height = size + "px";

  if (type === "latest") {
    el.classList.add("red", "pulse");
  } else if (type === "secondary") {
    el.classList.add("orange", "pulse");
  } else {
    el.classList.add("blue");
  }

  return L.marker([lat, lon], {
    icon: L.divIcon({
      html: el,
      className: "",
      iconSize: [size, size]
    })
  });
}

/* FOCUS + RETURN */
function focusOn(lat, lon) {
  map.flyTo([lat, lon], 5, { duration: 2 });

  if (returnTimeout) clearTimeout(returnTimeout);

  returnTimeout = setTimeout(() => {
    map.flyTo(DEFAULT_VIEW.center, DEFAULT_VIEW.zoom, { duration: 2 });
  }, 60000);
}

/* LOAD DATA */
function loadData() {
  fetch(API_URL)
    .then(r => r.json())
    .then(data => {

      if (!data.features) return;

      let features = data.features.slice(0, 20);

      markersLayer.clearLayers();

      features.forEach((f, index) => {
        let coords = f.geometry.coordinates;
        let props = f.properties;

        let type = "dot";
        if (index === 0) type = "latest";
        else if (index === 1 || index === 2) type = "secondary";

        let marker = createMarker(
          coords[1],
          coords[0],
          type,
          props.mag
        );

        marker.addTo(markersLayer);

        if (index === 0) {
          let currentId = f.id;

          if (currentId !== lastEventId) {
            lastEventId = currentId;

            if (props.mag >= 5) {
              focusOn(coords[1], coords[0]);
            }
          }

          let mag = props.mag ?? "?";
          let place = props.place || "Unknown";

          marker.bindTooltip(
            `<div class="label">M${mag}<br>${place}</div>`,
            {
              permanent: true,
              direction: "top",
              offset: [0, -15]
            }
          ).openTooltip();
        }
      });

    })
    .catch(err => console.log(err));
}

loadData();
setInterval(loadData, 60000);
</script>

</body>
</html>
