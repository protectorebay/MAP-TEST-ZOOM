<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Earthquake World Map</title>

<meta name="viewport" content="width=2100, initial-scale=1.0">

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
html, body {
  margin: 0;
  padding: 0;
  width: 2100px;
  height: 1080px;
  overflow: hidden;
  background: black;
}

#map {
  width: 100%;
  height: 100%;
  position: relative;
}

.leaflet-container {
  background: black !important;
}

/* TARGET MARKER (blue) */
.target {
  width: 12px;
  height: 12px;
  border: 2px solid #00aaff;
  border-radius: 50%;
  position: relative;
}
.target::after {
  content: "";
  position: absolute;
  width: 6px;
  height: 6px;
  background: #00aaff;
  border-radius: 50%;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
}

/* LABEL (bigger) */
.label {
  background: rgba(0,0,0,0.9);
  color: white;
  padding: 8px 14px;
  border-radius: 6px;
  font-weight: bold;
  font-size: 18px;
}

/* MARKER */
.marker {
  border-radius: 50%;
  position: relative;
}

.red { background: red; }
.orange { background: orange; }

/* PULSE */
.pulse::after {
  content: "";
  position: absolute;
  width: 100%;
  height: 100%;
  border-radius: 50%;
  left: 0;
  top: 0;
  animation: pulse 2s infinite;
}

.pulse.red::after { background: red; }
.pulse.orange::after { background: orange; }

@keyframes pulse {
  0%   { transform: scale(1); opacity: 1; }
  70%  { transform: scale(2.5); opacity: 0; }
  100% { transform: scale(2.5); opacity: 0; }
}
</style>
</head>

<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
const API_URL = "https://earthquake.usgs.gov/earthquakes/feed/v1.0/summary/all_hour.geojson";
const MAPTILER_KEY = "sygtoTM5lxScVNfPR99k";

/* MAP */
let map = L.map('map', {
  zoomControl: false,
  attributionControl: false,
  worldCopyJump: false
}).setView([10, 0], 2.8);

/* Satellite Plain */
L.tileLayer(
  `https://api.maptiler.com/maps/satellite/{z}/{x}/{y}.jpg?key=${MAPTILER_KEY}`,
  {
    tileSize: 512,
    zoomOffset: -1,
    detectRetina: true,
    noWrap: true
  }
).addTo(map);

let markersLayer = L.layerGroup().addTo(map);

const DEFAULT_CENTER = [10, 0];
const DEFAULT_ZOOM = 2.8;

let returnTimeout = null;
let lastEventId = null;

/* SIZE */
function getSize(mag, base) {
  if (!mag || mag < 2) return base;
  if (mag < 3) return base + 3;
  if (mag < 4) return base + 6;
  if (mag < 5) return base + 9;
  return base + 12;
}

/* CREATE MARKER */
function createMarker(lat, lon, type, mag) {

  if (type === "small") {
    let el = document.createElement("div");
    el.className = "target";

    return L.marker([lat, lon], {
      icon: L.divIcon({
        html: el,
        className: "",
        iconSize: [14, 14]
      })
    });
  }

  let size = 15;

  if (type === "latest") size = getSize(mag, 27);
  else if (type === "secondary") size = getSize(mag, 18);

  let el = document.createElement("div");
  el.className = "marker";

  el.style.width = size + "px";
  el.style.height = size + "px";

  if (type === "latest") {
    el.classList.add("red", "pulse");
  } else if (type === "secondary") {
    el.classList.add("orange", "pulse");
  }

  return L.marker([lat, lon], {
    icon: L.divIcon({
      html: el,
      className: "",
      iconSize: [size, size]
    })
  });
}

/* ZOOM */
function focusOn(lat, lon) {
  map.flyTo([lat, lon], 5, { duration: 2 });

  if (returnTimeout) clearTimeout(returnTimeout);

  returnTimeout = setTimeout(() => {
    map.flyTo(DEFAULT_CENTER, DEFAULT_ZOOM, { duration: 2 });
  }, 60000);
}

/* LOAD */
function loadData() {
  fetch(API_URL)
    .then(r => r.json())
    .then(data => {

      if (!data.features) return;

      let features = data.features.slice(0, 18);

      markersLayer.clearLayers();

      features.forEach((f, index) => {
        let coords = f.geometry.coordinates;
        let props = f.properties;

        let type = "small";

        if (index === 0) type = "latest";
        else if (index === 1 || index === 2) type = "secondary";

        if (index === 0) {
          let currentId = f.id;

          if (currentId !== lastEventId) {
            lastEventId = currentId;

            if (props.mag >= 5) {
              focusOn(coords[1], coords[0]);
            }
          }
        }

        let marker = createMarker(
          coords[1],
          coords[0],
          type,
          props.mag
        );

        marker.addTo(markersLayer);

        if (index === 0) {
          let mag = props.mag ?? "?";
          let place = props.place || "Unknown";

          marker.bindTooltip(
            `<div class="label">M${mag} — ${place}</div>`,
            {
              permanent: true,
              direction: "top",
              offset: [0, -18]
            }
          ).openTooltip();
        }
      });

    })
    .catch(err => console.log(err));
}

loadData();
setInterval(loadData, 30000);
</script>

</body>
</html>
