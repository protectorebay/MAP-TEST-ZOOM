<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Earthquake Map</title>

<meta name="viewport" content="width=2300, initial-scale=1.0">

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
html, body {
  margin: 0;
  padding: 0;
  width: 2300px;
  height: 1080px;
  overflow: hidden;
  background: black;
}

#map {
  width: 100%;
  height: 100%;
}
</style>
</head>

<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
const API_URL = "https://earthquake.usgs.gov/earthquakes/feed/v1.0/summary/all_hour.geojson";
const MAPTILER_KEY = "sygtoTM5lxScVNfPR99k";

/* MAP */
let map = L.map('map', {
  zoomControl: false,
  attributionControl: false
}).setView([10, 0], 2.8);

/* Satellite */
L.tileLayer(
  `https://api.maptiler.com/maps/satellite/{z}/{x}/{y}.jpg?key=${MAPTILER_KEY}`,
  {
    tileSize: 512,
    zoomOffset: -1,
    detectRetina: true,
    noWrap: true
  }
).addTo(map);

let layer = L.layerGroup().addTo(map);

/* LOAD */
function loadData() {
  fetch(API_URL)
    .then(r => r.json())
    .then(data => {

      if (!data.features) return;

      let features = data.features.slice(0, 15);

      layer.clearLayers();

      features.forEach((f, index) => {

        let lat = f.geometry.coordinates[1];
        let lon = f.geometry.coordinates[0];

        // edge fix
        if (lon < -160) lon += 360;

        let isLatest = index === 0;

        let marker = L.circleMarker([lat, lon], {
          radius: isLatest ? 12 : 10,
          color: isLatest ? "red" : "#00ff00",
          fillColor: isLatest ? "red" : "#00ff00",
          fillOpacity: 1,
          weight: 2
        });

        marker.addTo(layer);

      });

    })
    .catch(err => console.log(err));
}

loadData();
setInterval(loadData, 30000);
</script>

</body>
</html>
